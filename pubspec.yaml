name: coin
version: 0.1.0
description: >-
  Cross-platform multi-coin cryptocurrency toolkit: Monero, Bitcoin, EVM.
  BIP-32/39/44 HD keys, Schnorr/ECDSA signing, PSBT, BIP-47, MuSig2, ABI codec,
  native secp256k1 FFI with pure-Dart fallback.

repository: https://github.com/ManyMath/coin

topics:
  - cryptocurrency
  - blockchain
  - monero
  - bitcoin
  - ethereum

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  crypto: ^3.0.3
  pointycastle: ^3.7.3
  collection: ^1.17.1
  ffi: ^2.1.0
  wasm_interop: ^2.0.1
  meta: ^1.9.0

dev_dependencies:
  ffigen: ^10.0.0
  lints: ^3.0.0
  test: ^1.24.0
